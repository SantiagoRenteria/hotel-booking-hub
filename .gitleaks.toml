# Configuración de gitleaks · hotel-booking-hub
#
# Extiende la config por defecto y excluye del escaneo las carpetas de TOOLING DE IA (vendored):
#   - .claude/  → skills, prompts y configuración del agente (Claude Code + BMAD).
#   - _bmad/    → método BMAD: skills y "knowledge" con TOKENS DE EJEMPLO en su documentación
#                 (p. ej. `const expiredToken = '...'`) que NO son secretos reales.
#
# Estas carpetas se versionan A PROPÓSITO para evidenciar el uso de IA en el desarrollo
# (requisito de la prueba); se excluyen del secret scanning solo para evitar falsos positivos.
# El código y la configuración PROPIOS (src/, deploy/, tests/, postman/, .github/) SÍ se escanean.

title = "hotel-booking-hub gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Tooling de IA vendored (BMAD / Claude Code): ejemplos de documentación, no secretos reales"
paths = [
    '''^\.claude/''',
    '''^_bmad/''',
]
# Claves JWT de PRUEBA (Story 6.1): constantes de test con prefijo explícito 'clave-de-prueba'/'clave-corta',
# usadas por los tests para firmar/validar tokens en memoria. NO son secretos reales. El allowlist por regex
# aplica a TODOS los commits escaneados (a diferencia de 'gitleaks:allow' inline, que solo cubre la versión con
# el comentario). tests/ sigue escaneado para secretos reales.
regexes = [
    '''clave-(de-prueba|corta)[a-z0-9-]*''',
]
