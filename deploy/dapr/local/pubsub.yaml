apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: pubsub
spec:
  type: pubsub.redis
  version: v1
  metadata:
    - name: redisHost
      value: localhost:6379
    - name: redisPassword
      value: ""
# Componente de DESARROLLO LOCAL para `dapr run` (Redis). El mismo topic se sirve con RabbitMQ en
# docker-compose y con Azure Service Bus en la nube, cambiando solo este YAML (cloud-agnostic, ADR-002).
