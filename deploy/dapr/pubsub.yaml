apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: pubsub
spec:
  type: pubsub.rabbitmq
  version: v1
  metadata:
    # Cero secretos en el repo: la cadena de conexión se resuelve por Dapr Secrets (local) / Key Vault (nube).
    - name: connectionString
      secretKeyRef:
        name: rabbitmq-connection
        key: connectionString
