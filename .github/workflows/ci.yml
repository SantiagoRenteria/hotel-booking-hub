name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

env:
  DOTNET_VERSION: "10.0.x"
  DOTNET_NOLOGO: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"

jobs:
  build-test:
    name: Build · Format · Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore HotelBookingHub.slnx

      - name: Format (verify)
        run: dotnet format HotelBookingHub.slnx --verify-no-changes --no-restore

      - name: Build (TreatWarningsAsErrors)
        run: dotnet build HotelBookingHub.slnx -c Release --no-restore

      - name: Test (unit + NetArchTest)
        run: dotnet test HotelBookingHub.slnx -c Release --no-build --verbosity normal
        # Nota: los IntegrationTests con Testcontainers.MsSql y la collection G1 (concurrencia)
        # llegan desde la Story 1.5/1.6c y correrán en un stage secuencial aparte.

  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Smoke test de docker-compose (G2 / AC-E1.1.1). SCAFFOLDED — pendiente de
  # verificación de runtime: requiere Dockerfiles verificados y el stack completo
  # (SQL Server x2, Redis, RabbitMQ). Se habilitará al cerrar la verificación de
  # ejecución de la Story 1.1. Mientras tanto no bloquea el pipeline.
  # ---------------------------------------------------------------------------
  smoke-compose:
    name: Smoke · docker compose up + /health (pendiente)
    if: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: docker compose up
        run: docker compose -f deploy/docker-compose.yml up -d --build
      - name: Verificar /health
        run: |
          set -e
          for svc in 8080 8081 8082 8083; do
            curl --retry 20 --retry-all-errors --retry-delay 5 -fsS "http://localhost:${svc}/health"
          done
      - name: Teardown
        if: always()
        run: docker compose -f deploy/docker-compose.yml down -v
