name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

env:
  DOTNET_VERSION: "10.0.x"
  DOTNET_NOLOGO: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"

jobs:
  build-test:
    name: Build · Format · Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore HotelBookingHub.slnx

      - name: Format (verify)
        run: dotnet format HotelBookingHub.slnx --verify-no-changes --no-restore

      - name: Build (TreatWarningsAsErrors)
        run: dotnet build HotelBookingHub.slnx -c Release --no-restore

      - name: Test (unit + integración, EXCEPTO G1)
        # Todo salvo la collection G1 del money test (concurrencia): corre en el pool paralelo.
        run: dotnet test HotelBookingHub.slnx -c Release --no-build --verbosity normal --filter "Category!=G1"

      - name: Money test G1 (secuencial, aislado)
        # El money test de concurrencia (Story 1.6c) corre SOLO, en secuencia, nunca en el pool paralelo:
        # un deadlock intermitente no debe contaminar otras suites. Bloqueante en PR a main.
        run: dotnet test HotelBookingHub.slnx -c Release --no-build --verbosity normal --filter "Category=G1"

  terraform:
    name: Terraform · fmt + validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.8"
      # fmt + validate NO requieren credenciales de Azure (compuerta de Fase 3: plan/apply van con auth aparte).
      - name: Format (check)
        run: terraform -chdir=deploy/terraform fmt -check -recursive
      - name: Init (sin backend)
        run: terraform -chdir=deploy/terraform init -backend=false -input=false
      - name: Validate
        run: terraform -chdir=deploy/terraform validate

  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Usa .gitleaks.toml del repo (allowlist de tooling de IA vendored: .claude/ y _bmad/).
          GITLEAKS_CONFIG: .gitleaks.toml

  # ---------------------------------------------------------------------------
  # Smoke test de docker-compose (G2 / AC-E1.1.1): levanta el stack y verifica /health.
  # Verificado localmente en la Story 1.1. Es el gate PESADO (build de 4 imágenes + SQL x2):
  # se ejecuta solo en la integración hacia `main` (push a main / PR a main), no en cada push a develop.
  # ---------------------------------------------------------------------------
  smoke-compose:
    name: Smoke · docker compose up + /health + Postman
    if: github.ref == 'refs/heads/main' || github.base_ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Crear deploy/.env (secretos efímeros de CI)
        run: |
          echo "MSSQL_SA_PASSWORD=Ci_$(openssl rand -hex 12)!" > deploy/.env
          # Clave JWT efímera (Story 6.1): los servicios validan la config de forma eager y NO arrancan sin
          # ella. Generada en tiempo de CI → cero secretos en el repositorio.
          echo "JWT_SIGNING_KEY=$(openssl rand -base64 48)" >> deploy/.env
      - name: docker compose up
        run: docker compose -f deploy/docker-compose.yml --env-file deploy/.env up -d --build
      - name: Verificar /health (gateway 8080, hoteles 8081, reservas 8082, notificaciones 8083)
        run: |
          set -e
          for port in 8080 8081 8082 8083; do
            curl --retry 30 --retry-all-errors --retry-delay 5 -fsS "http://localhost:${port}/health"
            echo " -> ${port}/health OK"
          done
      - name: Postman / Newman (flujo E2E + negativos, AC-ET.1.4)
        run: |
          set -e
          npm install -g newman
          JWT="$(grep '^JWT_SIGNING_KEY=' deploy/.env | cut -d= -f2-)"
          newman run postman/hotel-booking-hub.postman_collection.json \
            --env-var "baseUrl=http://localhost:8080" \
            --env-var "jwtSigningKey=$JWT"
      - name: Teardown
        if: always()
        run: docker compose -f deploy/docker-compose.yml --env-file deploy/.env down -v
